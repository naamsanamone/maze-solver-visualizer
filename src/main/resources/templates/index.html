<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Solver Visualizer</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="app-layout">
        <!-- Top Bar: Logo + Controls + Buttons (single row) -->
        <header class="top-bar">
            <div class="logo">
                <h1>🧩 Maze Solver</h1>
            </div>

            <div class="toolbar">
                <div class="control-group">
                    <label for="algorithm-select">Alg:</label>
                    <select id="algorithm-select">
                        <option value="" disabled selected>Loading</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="speed-slider">Spd:</label>
                    <div class="slider-wrap">
                        <input type="range" id="speed-slider" min="1" max="100" value="50">
                        <span id="speed-label">50ms</span>
                    </div>
                </div>

                <div class="control-group">
                    <label for="grid-size">Grid:</label>
                    <select id="grid-size">
                        <option value="15">15×15</option>
                        <option value="20" selected>20×20</option>
                        <option value="25">25×25</option>
                        <option value="30">30×30</option>
                        <option value="40">40×40</option>
                    </select>
                </div>

                <!-- Draw Mode Buttons -->
                <div class="control-group mode-group">
                    <button id="mode-wall" class="mode-btn active" data-mode="wall" title="Draw walls">🧱</button>
                    <button id="mode-start" class="mode-btn" data-mode="start" title="Place start">🟢</button>
                    <button id="mode-end" class="mode-btn" data-mode="end" title="Place end">🔴</button>
                    <button id="mode-erase" class="mode-btn" data-mode="erase" title="Erase">⬜</button>
                </div>
            </div>

            <div class="action-buttons">
                <button id="btn-generate" class="btn btn-secondary">🔀 Generate</button>
                <button id="btn-solve" class="btn btn-primary" disabled>▶ Solve</button>
                <button id="btn-reset" class="btn btn-danger" title="Clear Grid">🗑</button>
            </div>
        </header>

        <!-- Main Area: Grid (center) + Stats Sidebar (right) -->
        <main class="main-area">
            <div class="grid-container">
                <canvas id="maze-canvas"></canvas>
            </div>

            <aside class="stats-sidebar">
                <div class="stats-section">
                    <h3>📊 Statistics</h3>
                    <div class="stat-row">
                        <span class="stat-label">Algorithm</span>
                        <span class="stat-value" id="stat-algo">—</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Explored</span>
                        <span class="stat-value" id="stat-nodes">—</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Path Len</span>
                        <span class="stat-value" id="stat-path">—</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Time</span>
                        <span class="stat-value" id="stat-time">—</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Found</span>
                        <span class="stat-value" id="stat-found">—</span>
                    </div>
                </div>
                <div class="legend-section">
                    <h3>🎨 Legend</h3>
                    <div class="legend-grid">
                        <span class="legend-dot" style="background:#2d2d2d; box-shadow: inset 0 0 2px rgba(255,255,255,0.1)"></span><span>Wall</span>
                        <span class="legend-dot" style="background:#00e676; box-shadow: 0 0 8px rgba(0,230,118,0.5)"></span><span>Start</span>
                        <span class="legend-dot" style="background:#ff5252; box-shadow: 0 0 8px rgba(255,82,82,0.5)"></span><span>End</span>
                        <span class="legend-dot" style="background:#00bcd4; box-shadow: 0 0 8px rgba(0,188,212,0.5)"></span><span>Visited</span>
                        <span class="legend-dot" style="background:#ffd700; box-shadow: 0 0 8px rgba(255,215,0,0.5)"></span><span>Path</span>
                    </div>
                </div>
                <div class="footer-text">Built with Spring Boot + Thymeleaf</div>
            </aside>
        </main>
    </div>

    <script th:src="@{/js/grid.js}"></script>
    <script th:src="@{/js/api.js}"></script>
    <script th:src="@{/js/visualizer.js}"></script>
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
